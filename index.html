<!doctype html>
<html lang="en">

<head>

    <title>Smit Setup</title>
    <meta name="description" content="Minimal setup page for Smit's current device, editor, font, and AI stack.">
    <link rel="stylesheet" href="stylesheets/styles.css">

    <main class="page">
        <h1>Smit's setup.</h1>

            <div class="row">
                <p class="label">Device</p>
                <p class="value">MacBook Air M2</p>
            </div>

                <p class="label">Code Editor</p>
                <p class="value">Neovim</p>
            </div>
            <div class="row">
                <p class="label">Font</p>
                <p class="value">JetBrains Mono</p>
            </div>
            <div class="row">
                <p class="label">Terminal</p>
                <p class="value">Ghostty</p>
            </div>
            <div class="row">
                <p class="label">AI Models</p>
                <p class="value">Codex 5.4</p>
